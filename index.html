<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Lee Voice AI Agency | Sophia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div id="hero" class="text-center max-w-2xl transition-all duration-700">
        <h1 class="text-5xl font-bold mb-6 bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">
            Talk to Sophia – Book Your Strategy Call
        </h1>
        <button id="startBtn" class="bg-sky-500 hover:bg-sky-400 text-white font-semibold py-4 px-10 rounded-full text-xl transition-all flex items-center gap-3 mx-auto">
            Speak to Sophia
        </button>
    </div>

    <div id="callUi" class="hidden glass p-10 rounded-3xl w-full max-w-md text-center">
        <div class="w-24 h-24 bg-sky-500 rounded-full mx-auto mb-8 pulse"></div>
        <h2 class="text-2xl font-semibold mb-2">Sophia is Listening</h2>
        <p id="statusText" class="text-slate-400 italic">Connecting to secure server...</p>
    </div>

    <script>
        const startBtn = document.getElementById('startBtn');
        const hero = document.getElementById('hero');
        const callUi = document.getElementById('callUi');
        const statusText = document.getElementById('statusText');

        startBtn.addEventListener('click', async () => {
            // 1. Show the Loading UI
            hero.classList.add('hidden');
            callUi.classList.remove('hidden');

            try {
                // 2. FETCH THE KEY SECURELY
                statusText.innerText = "Authorizing microphone...";
                const response = await fetch('/api/speech');
                const data = await response.json();
                
                if (!data.apiKey) {
                    throw new Error("API Key not found in Vercel settings.");
                }

                // 3. START THE VOICE (Placeholder for SDK logic)
                statusText.innerText = "Connected! Sophia is ready.";
                console.log("Success! Key retrieved securely.");
                
                // In a real demo, you'd now initialize: 
                // new MultimodalLiveClient({ apiKey: data.apiKey });

            } catch (err) {
                statusText.innerText = "Error: " + err.message;
                statusText.classList.add('text-rose-400');
            }
        });
    </script>
</body>
</html>
