<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Lee Voice AI Agency | Sophia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div id="hero" class="max-w-2xl">
        <h1 class="text-5xl font-bold mb-6 bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent">
            Talk to Sophia
        </h1>
        <button id="startBtn" class="bg-sky-500 hover:bg-sky-400 text-white font-bold py-5 px-12 rounded-full text-xl shadow-xl transition-all">
            Speak to Sophia
        </button>
    </div>

    <div id="callUi" class="hidden glass p-12 rounded-[2.5rem] w-full max-w-md">
        <div class="w-32 h-32 bg-sky-500 rounded-full mx-auto mb-10 pulse flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" viewBox="0 0 16 16">
              <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/><path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/>
            </svg>
        </div>
        <h2 class="text-3xl font-bold mb-3">Sophia is Active</h2>
        <p id="statusText" class="text-sky-300 font-medium">Connecting to Google AI...</p>
        <button onclick="location.reload()" class="mt-12 bg-rose-500/10 text-rose-400 py-3 px-8 rounded-full text-xs font-black uppercase">End Session</button>
    </div>

    <script type="module">
        const startBtn = document.getElementById('startBtn');
        const hero = document.getElementById('hero');
        const callUi = document.getElementById('callUi');
        const statusText = document.getElementById('statusText');

        let socket;
        let audioCtx;

        startBtn.addEventListener('click', async () => {
            hero.classList.add('hidden');
            callUi.classList.remove('hidden');

            try {
                const res = await fetch('/api/speech');
                const { apiKey } = await res.json();
                
                // Use the v1alpha version specifically for Multimodal Live
                const URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BiDiGenerateContent?key=${apiKey}`;
                socket = new WebSocket(URL);

                socket.onopen = () => {
                    statusText.innerText = "Connected! Start speaking.";
                    
                    const config = {
                        setup: {
                            model: "models/gemini-2.0-flash-exp",
                            generation_config: {
                                response_modalities: ["AUDIO"],
                                speech_config: {
                                    voice_config: { prebuilt_voice_config: { voice_name: "Aoide" } }
                                }
                            }
                        }
                    };
                    socket.send(JSON.stringify(config));
                };

                socket.onmessage = async (event) => {
                    const response = JSON.parse(event.data);
                    // Extract the audio bytes from the model's turn
                    const audioBase64 = response.serverContent?.modelTurn?.parts?.[0]?.inlineData?.data;
                    if (audioBase64) {
                        playAudioChunk(audioBase64);
                    }
                };

                socket.onerror = (err) => {
                    statusText.innerText = "Connection Rejected. Check API Key.";
                    console.error("WebSocket Error:", err);
                };

                // Setup Mic
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioCtx = new AudioContext({ sampleRate: 16000 });
                const source = audioCtx.createMediaStreamSource(stream);
                const processor = audioCtx.createScriptProcessor(4096, 1, 1);

                source.connect(processor);
                processor.connect(audioCtx.destination);

                processor.onaudioprocess = (e) => {
                    if (socket?.readyState === WebSocket.OPEN) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        const base64Data = arrayBufferToBase64(floatTo16BitPCM(inputData));
                        socket.send(JSON.stringify({
                            realtime_input: { media_chunks: [{ mime_type: "audio/pcm;rate=16000", data: base64Data }] }
                        }));
                    }
                };

            } catch (err) {
                statusText.innerText = "System Error: " + err.message;
            }
        });

        function floatTo16BitPCM(input) {
            let output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                let s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output.buffer;
        }

        function arrayBufferToBase64(buffer) {
            let binary = '';
            let bytes = new Uint8Array(buffer);
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        async function playAudioChunk(base64) {
            const arrayBuffer = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
            // Web Audio API is needed here to play raw PCM data
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer).catch(() => null);
            if (audioBuffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = audioBuffer;
                source.connect(audioCtx.destination);
                source.start();
            }
        }
    </script>
</body>
</html>
