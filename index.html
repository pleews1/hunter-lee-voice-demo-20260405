<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hunter Lee Voice AI Agency | Sophia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(56, 189, 248, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div id="hero" class="max-w-2xl transition-all duration-700">
        <h1 class="text-5xl font-bold mb-6 bg-gradient-to-r from-sky-400 to-indigo-400 bg-clip-text text-transparent leading-tight">
            Talk to Sophia – Book Your Strategy Call
        </h1>
        <p class="text-slate-400 mb-10 text-lg">Your AI-powered concierge for Hunter Lee Voice AI Agency.</p>
        <button id="startBtn" class="bg-sky-500 hover:bg-sky-400 text-white font-bold py-5 px-12 rounded-full text-xl transition-all shadow-xl shadow-sky-500/20 active:scale-95">
            Speak to Sophia
        </button>
    </div>

    <div id="callUi" class="hidden glass p-12 rounded-[2.5rem] w-full max-w-md border border-white/5 shadow-2xl">
        <div class="w-32 h-32 bg-sky-500 rounded-full mx-auto mb-10 pulse flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="currentColor" viewBox="0 0 16 16">
              <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/>
              <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/>
            </svg>
        </div>
        <h2 class="text-3xl font-bold mb-3">Sophia is Active</h2>
        <p id="statusText" class="text-sky-300 font-medium tracking-wide">Connecting securely...</p>
        <p class="mt-6 text-slate-500 text-sm">"I'd love to help you book a strategy call..."</p>
        
        <button onclick="location.reload()" class="mt-12 bg-rose-500/10 text-rose-400 hover:bg-rose-500/20 py-3 px-8 rounded-full text-xs font-black uppercase tracking-widest transition-all">
            End Session
        </button>
    </div>

    <script type="module">
        const startBtn = document.getElementById('startBtn');
        const hero = document.getElementById('hero');
        const callUi = document.getElementById('callUi');
        const statusText = document.getElementById('statusText');

        // This is a direct connection to the Gemini Realtime WebSocket
        let socket;

        startBtn.addEventListener('click', async () => {
            hero.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                hero.classList.add('hidden');
                callUi.classList.remove('hidden');
                setTimeout(() => callUi.classList.remove('opacity-0'), 50);
            }, 500);

            try {
                // 1. Get Key from your Vercel /api/speech.js
                const res = await fetch('/api/speech');
                const { apiKey } = await res.json();
                
                if (!apiKey) throw new Error("Key not found");

                // 2. Setup WebSocket directly to Google (Bypassing the broken SDK link)
                const URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1alpha.GenerativeService.BiDiGenerateContent?key=${apiKey}`;
                socket = new WebSocket(URL);

                socket.onopen = () => {
                    statusText.innerText = "Connected! Speak to Sophia.";
                    
                    // Send Configuration to set the persona
                    const config = {
                        setup: {
                            model: "models/gemini-2.0-flash-exp",
                            generation_config: {
                                response_modalities: ["AUDIO"],
                                speech_config: {
                                    voice_config: { prebuilt_voice_config: { voice_name: "Aoide" } }
                                }
                            },
                            system_instruction: { 
                                parts: [{ text: "You are Sophia, a warm, professional Australian female from Hunter Lee Voice AI Agency. Never say you are an AI. Greeting: 'Hello, this is Sophia from Hunter Lee Voice AI Agency. I'd love to help you book a strategy call with Hunter. May I have your name please?' Collect: Name, Company, Email. Offer 30/60min slots Mon-Fri 9-5 Sydney time." }] 
                            }
                        }
                    };
                    socket.send(JSON.stringify(config));
                };

                socket.onmessage = async (event) => {
                    const response = JSON.parse(event.data);
                    if (response.serverContent?.modelTurn?.parts?.[0]?.inlineData) {
                        const audioData = response.serverContent.modelTurn.parts[0].inlineData.data;
                        playAudio(audioData);
                    }
                };

                // 3. Setup Mic Recording
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new AudioContext({ sampleRate: 16000 });
                const source = audioContext.createMediaStreamSource(stream);
                const processor = audioContext.createScriptProcessor(4096, 1, 1);

                source.connect(processor);
                processor.connect(audioContext.destination);

                processor.onaudioprocess = (e) => {
                    if (socket && socket.readyState === WebSocket.OPEN) {
                        const inputData = e.inputBuffer.getChannelData(0);
                        const pcmData = floatTo16BitPCM(inputData);
                        const base64Data = btoa(String.fromCharCode(...new Uint8Array(pcmData.buffer)));
                        
                        socket.send(JSON.stringify({
                            realtime_input: { media_chunks: [{ mime_type: "audio/pcm;rate=16000", data: base64Data }] }
                        }));
                    }
                };

            } catch (err) {
                statusText.innerText = "Error: " + err.message;
            }
        });

        // Helper: Convert Browser Audio to Google-friendly format
        function floatTo16BitPCM(input) {
            let output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                let s = Math.max(-1, Math.min(1, input[i]));
                output[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
            }
            return output;
        }

        // Helper: Play the AI's response
        function playAudio(base64Data) {
            const binary = atob(base64Data);
            const array = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) array[i] = binary.charCodeAt(i);
            
            const blob = new Blob([array], { type: 'audio/pcm' });
            // For a production app, use an AudioQueue to prevent gaps
            const audio = new Audio(URL.createObjectURL(blob));
            audio.play();
        }
    </script>
</body>
</html>
